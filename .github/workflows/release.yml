name: Release

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    name: Build and Upload Release Assets
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: p2p-play
            asset_name: p2p-play-linux-x86_64
            linker: ""
            strip_tool: strip
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: p2p-play
            asset_name: p2p-play-linux-aarch64
            linker: aarch64-linux-gnu-gcc
            strip_tool: aarch64-linux-gnu-strip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: p2p-play.exe
            asset_name: p2p-play-windows-x86_64.exe
            linker: ""
            strip_tool: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: p2p-play
            asset_name: p2p-play-macos-x86_64
            linker: ""
            strip_tool: strip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: p2p-play
            asset_name: p2p-play-macos-aarch64
            linker: ""
            strip_tool: strip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Linux cross-compilation tools
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        override: true

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Run tests
      run: |
        if [ -n "${{ matrix.linker }}" ]; then
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${{ matrix.linker }}"
          export CC_aarch64_unknown_linux_gnu="${{ matrix.linker }}"
        fi

        if [ -f "./scripts/test_runner.sh" ]; then
          chmod +x ./scripts/test_runner.sh
          ./scripts/test_runner.sh
        else
          cargo test
        fi
      shell: bash

    - name: Build release binary
      run: |
        if [ -n "${{ matrix.linker }}" ]; then
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${{ matrix.linker }}"
          export CC_aarch64_unknown_linux_gnu="${{ matrix.linker }}"
        fi

        cargo build --release --target ${{ matrix.target }}

    - name: Prepare artifact (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        if [ -n "${{ matrix.strip_tool }}" ]; then
          ${{ matrix.strip_tool }} ${{ matrix.asset_name }} || true
        fi

    - name: Prepare artifact (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        copy target\${{ matrix.target }}\release\${{ matrix.artifact_name }} ${{ matrix.asset_name }}

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./${{ matrix.asset_name }}
        asset_name: ${{ matrix.asset_name }}
        asset_content_type: application/octet-stream
